name: Auto Update Live Events

on:
  schedule:
    - cron: '0 * * * *' # Runs every 1 hour automatically
  workflow_dispatch: # Allows manual trigger button in GitHub

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/node-version@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install firebase-admin axios

      - name: Run Auto Update Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/update_events.js
