name: Sports Events Auto Updater

on:
  schedule:
    - cron: '0 * * * *' # Runs automatically every 1 hour
  workflow_dispatch:     # Allows manual trigger button

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Auto Sports Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node index.js
